version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: performpro-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/performpro.db
      - SECRET_KEY=super-secret-enterprise-key-in-prod
    volumes:
      - ./backend/data:/app/data
      - ./backend/app/uploads:/app/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: performpro-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
